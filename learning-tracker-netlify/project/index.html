<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-header">
      <div class="brand">
        <div class="brand-icon"><i class="ti ti-book-2"></i></div>
        <div>
          <div class="brand-name">Learning Tracker</div>
          <div class="brand-date" id="topdate"></div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="streak-pill" id="streak-badge"></div>
        <button class="icon-btn" id="theme-toggle-btn" title="Ganti tema" style="font-size:17px;border:1px solid var(--border-strong);border-radius:8px;padding:6px 8px"><i class="ti ti-moon"></i></button>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </div>
  <div class="main" id="main"></div>
</div>
<div id="toast-el" class="toast" style="display:none"></div>

<script src="js/app.js"></script>
</body>
</html>
